<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACISC · Dashboard de Oficina Central</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --dark: #1e5b4f; --dark2: #164a3f; --green: #2d9e7e; --tint: #e8f5f1; --tint2: #d3ede4;
    --ink: #1c2b28; --gray: #5b6b68; --line: #d7e2df; --white: #ffffff;
    --amber: #b8790f; --red: #b3413a;
    --green-dark:#002f2a; --green-mid:#1e5b4f; --green-light:#2d9e7e;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:#f4f7f6; color:var(--ink); font-family:'Barlow',sans-serif; font-size:14px; line-height:1.45;}
  h1,h2,h3{font-family:'Barlow Condensed',sans-serif; font-weight:700;}

  /* ---------- Login ---------- */
  #login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg, var(--dark) 0%, var(--dark2) 100%); padding:20px;
  }
  .login-card{
    background:var(--white); border-radius:14px; padding:36px 32px; width:100%; max-width:380px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .login-card .brand-title{color:var(--dark); font-size:26px; margin:0 0 2px; font-family:'Barlow Condensed'; font-weight:700;}
  .login-card .brand-sub{color:var(--gray); font-size:12px; margin-bottom:22px; display:block;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--dark); margin-bottom:5px;}
  .field input, .field select{
    width:100%; padding:10px 12px; border:1.4px solid var(--line); border-radius:8px;
    font-family:'Barlow'; font-size:14px; color:var(--ink); background:#fff;
  }
  .field input:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(45,158,126,.15);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--dark); color:#fff; border:none; border-radius:9px;
    padding:11px 20px; font-family:'Barlow'; font-weight:600; font-size:13.5px; cursor:pointer;
  }
  .btn:hover{background:var(--dark2);}
  .btn.full{width:100%;}
  .btn.secondary{background:var(--tint); color:var(--dark);}
  .btn.danger{background:#fbeceb; color:var(--red);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .msg{font-size:12.5px; margin-top:10px; padding:9px 12px; border-radius:8px;}
  .msg.error{background:#fbeceb; color:var(--red);}
  .msg.ok{background:var(--tint); color:var(--dark);}

  /* ---------- App shell ---------- */
  #app{display:none;}
  .wrap{max-width:1200px; margin:0 auto; padding:24px 20px 60px;}
  .tabs{display:flex; gap:8px; margin-bottom:22px;}
  .tab-btn{
    background:#fff; border:1.4px solid var(--line); color:var(--gray);
    padding:10px 20px; border-radius:20px; font-weight:600; font-size:13.5px; cursor:pointer; font-family:'Barlow';
  }
  .tab-btn.active{background:var(--dark); border-color:var(--dark); color:#fff;}

  .kpi-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;}
  .kpi-card{background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px 20px;}
  .kpi-card .kpi-label{font-size:11.5px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.4px;}
  .kpi-card .kpi-value{font-family:'Barlow Condensed'; font-size:32px; font-weight:700; color:var(--dark); margin-top:4px;}
  @media(max-width:900px){ .kpi-row{grid-template-columns:1fr 1fr;} }

  .card{background:#fff; border:1px solid var(--line); border-radius:12px; padding:22px 24px; margin-bottom:20px; box-shadow:0 1px 3px rgba(28,43,40,.05);}
  .card h2{font-size:19px; color:var(--dark); margin:0 0 4px;}
  .card .card-sub{font-size:12.5px; color:var(--gray); margin:0 0 18px;}

  table.solicitudes{width:100%; border-collapse:collapse; font-size:12.8px;}
  table.solicitudes th{text-align:left; background:var(--tint); color:var(--dark); font-size:11px; text-transform:uppercase; letter-spacing:.4px; padding:9px 10px; border-bottom:1px solid var(--line);}
  table.solicitudes td{padding:10px; border-bottom:1px solid var(--line); vertical-align:top;}
  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}
  .badge.pendiente{background:#fdf2e2; color:var(--amber);}
  .badge.autorizado{background:var(--tint); color:var(--dark);}
  .badge.rechazado{background:#fbeceb; color:var(--red);}
  .badge.expirado{background:#ececec; color:var(--gray);}
  .badge.cerrado{background:#e3e9e8; color:var(--gray);}
  .empty-state{text-align:center; padding:40px 20px; color:var(--gray); font-size:13px;}
  .folio-chip{display:inline-block; background:var(--dark); color:#fff; font-weight:700; font-size:12px; padding:4px 10px; border-radius:7px;}
  .row-actions{display:flex; gap:6px;}
  .row-actions button{padding:6px 12px; font-size:12px; border-radius:7px; border:none; cursor:pointer; font-weight:700;}
  .filter-bar{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .filter-bar select, .filter-bar input{padding:8px 10px; border:1.4px solid var(--line); border-radius:8px; font-size:13px;}

  /* ---------- Modal QR ---------- */
  .modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff; border-radius:14px; padding:28px; max-width:340px; text-align:center;}
  .modal-box h3{color:var(--dark); margin:0 0 6px;}
  .modal-box p{font-size:12.5px; color:var(--gray); margin:0 0 16px;}
  .modal-box canvas{margin:0 auto;}

  header{background:#fff;border-bottom:3px solid var(--green-light);padding:14px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .header-logo{display:flex;align-items:center;gap:16px;}
  .header-logo img{height:52px;}
  .header-title{display:flex;flex-direction:column;justify-content:center;border-left:2px solid rgba(45,158,126,0.4);padding-left:14px;margin-right:4px;}
  .header-title .main{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:700;color:var(--green-dark);letter-spacing:0.04em;text-transform:uppercase;}
  .header-title .sub{font-size:0.78rem;font-weight:400;color:var(--gray);letter-spacing:0.02em;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .header-badge{background:#eaf6f1;color:var(--green-mid);border:1px solid rgba(45,158,126,0.4);border-radius:20px;padding:6px 16px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
  .btn-header{display:flex;align-items:center;gap:6px;background:#f0f7f5;border:1px solid rgba(30,91,79,0.3);color:var(--green-mid);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
  footer{background:var(--green-dark);color:rgba(255,255,255,0.7);padding:28px 40px;margin-top:auto;}
  .footer-inner{max-width:1500px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:24px;}
  .footer-org p{font-size:0.8rem;line-height:1.9;margin:0;}
  .footer-org p:first-child{color:#fff;font-weight:600;font-size:0.85rem;}
  .footer-credits{text-align:right;}
  .footer-credits p{font-size:0.78rem;line-height:1.9;margin:0;}
  .footer-credits p:first-child{color:#fff;font-weight:600;}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand-title">SACISC</div>
    <span class="brand-sub">Dashboard de Oficina Central · Control de Accesos</span>
    <div class="field">
      <label>Correo institucional PEMEX</label>
      <input type="email" id="login-email" placeholder="nombre.apellido@pemex.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn full" id="btn-login">Iniciar sesión</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <!-- header y footer reales se insertan por script para mantener el mismo patrón de los demás módulos -->
  <div id="header-placeholder"></div>

  <div class="wrap">
    <div class="kpi-row" id="kpi-row"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="pendientes">Pendientes</button>
      <button class="tab-btn" data-tab="historial">Historial</button>
    </div>

    <div id="tab-content"></div>
  </div>

  <div id="footer-placeholder"></div>
</div>

<!-- ================= MODAL QR ================= -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal-box">
    <h3 id="qr-modal-folio">Folio</h3>
    <p>Comparte este código con el área solicitante para el ingreso.</p>
    <canvas id="qr-canvas"></canvas>
    <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
      <a class="btn secondary" style="flex:1; text-align:center; text-decoration:none;" id="btn-enviar-correo" href="#" target="_blank">Enviar aviso por correo</a>
      <button class="btn" style="flex:1;" id="btn-descargar-qr">Descargar QR</button>
    </div>
    <button class="btn secondary full" style="margin-top:8px;" id="btn-cerrar-qr-modal">Cerrar</button>
  </div>
</div>

<script>
//---------------------------------------------------------------------
// QR Code Generator for JavaScript (Kazuhiko Arase, MIT license)
// Embebido localmente para no depender de ningun CDN externo.
//---------------------------------------------------------------------
var qrcode = function() {
  var qrcode = function(typeNumber, errorCorrectionLevel) {
    var PAD0 = 0xEC, PAD1 = 0x11;
    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null, _moduleCount = 0, _dataCache = null, _dataList = [];
    var _this = {};
    var makeImpl = function(test, maskPattern) {
      _moduleCount = _typeNumber * 4 + 17;
      _modules = (function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) modules[row][col] = null;
        }
        return modules;
      })(_moduleCount);
      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);
      if (_typeNumber >= 7) setupTypeNumber(test);
      if (_dataCache == null) _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      mapData(_dataCache, maskPattern);
    };
    var setupPositionProbePattern = function(row, col) {
      for (var r = -1; r <= 7; r += 1) {
        if (row + r <= -1 || _moduleCount <= row + r) continue;
        for (var c = -1; c <= 7; c += 1) {
          if (col + c <= -1 || _moduleCount <= col + c) continue;
          if ((0 <= r && r <= 6 && (c == 0 || c == 6)) || (0 <= c && c <= 6 && (r == 0 || r == 6)) || (2 <= r && r <= 4 && 2 <= c && c <= 4)) {
            _modules[row + r][col + c] = true;
          } else { _modules[row + r][col + c] = false; }
        }
      }
    };
    var getBestMaskPattern = function() {
      var minLostPoint = 0, pattern = 0;
      for (var i = 0; i < 8; i += 1) {
        makeImpl(true, i);
        var lostPoint = QRUtil.getLostPoint(_this);
        if (i == 0 || minLostPoint > lostPoint) { minLostPoint = lostPoint; pattern = i; }
      }
      return pattern;
    };
    var setupTimingPattern = function() {
      for (var r = 8; r < _moduleCount - 8; r += 1) { if (_modules[r][6] != null) continue; _modules[r][6] = (r % 2 == 0); }
      for (var c = 8; c < _moduleCount - 8; c += 1) { if (_modules[6][c] != null) continue; _modules[6][c] = (c % 2 == 0); }
    };
    var setupPositionAdjustPattern = function() {
      var pos = QRUtil.getPatternPosition(_typeNumber);
      for (var i = 0; i < pos.length; i += 1) {
        for (var j = 0; j < pos.length; j += 1) {
          var row = pos[i], col = pos[j];
          if (_modules[row][col] != null) continue;
          for (var r = -2; r <= 2; r += 1) {
            for (var c = -2; c <= 2; c += 1) {
              if (r == -2 || r == 2 || c == -2 || c == 2 || (r == 0 && c == 0)) { _modules[row + r][col + c] = true; }
              else { _modules[row + r][col + c] = false; }
            }
          }
        }
      }
    };
    var setupTypeNumber = function(test) {
      var bits = QRUtil.getBCHTypeNumber(_typeNumber);
      for (var i = 0; i < 18; i += 1) { var mod = (!test && ((bits >> i) & 1) == 1); _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod; }
      for (var i = 0; i < 18; i += 1) { var mod = (!test && ((bits >> i) & 1) == 1); _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod; }
    };
    var setupTypeInfo = function(test, maskPattern) {
      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);
      for (var i = 0; i < 15; i += 1) {
        var mod = (!test && ((bits >> i) & 1) == 1);
        if (i < 6) _modules[i][8] = mod; else if (i < 8) _modules[i + 1][8] = mod; else _modules[_moduleCount - 15 + i][8] = mod;
      }
      for (var i = 0; i < 15; i += 1) {
        var mod = (!test && ((bits >> i) & 1) == 1);
        if (i < 8) _modules[8][_moduleCount - i - 1] = mod; else if (i < 9) _modules[8][15 - i - 1 + 1] = mod; else _modules[8][15 - i - 1] = mod;
      }
      _modules[_moduleCount - 8][8] = (!test);
    };
    var mapData = function(data, maskPattern) {
      var inc = -1, row = _moduleCount - 1, bitIndex = 7, byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);
      for (var col = _moduleCount - 1; col > 0; col -= 2) {
        if (col == 6) col -= 1;
        while (true) {
          for (var c = 0; c < 2; c += 1) {
            if (_modules[row][col - c] == null) {
              var dark = false;
              if (byteIndex < data.length) dark = (((data[byteIndex] >>> bitIndex) & 1) == 1);
              var mask = maskFunc(row, col - c);
              if (mask) dark = !dark;
              _modules[row][col - c] = dark;
              bitIndex -= 1;
              if (bitIndex == -1) { byteIndex += 1; bitIndex = 7; }
            }
          }
          row += inc;
          if (row < 0 || _moduleCount <= row) { row -= inc; inc = -inc; break; }
        }
      }
    };
    var createBytes = function(buffer, rsBlocks) {
      var offset = 0, maxDcCount = 0, maxEcCount = 0;
      var dcdata = new Array(rsBlocks.length), ecdata = new Array(rsBlocks.length);
      for (var r = 0; r < rsBlocks.length; r += 1) {
        var dcCount = rsBlocks[r].dataCount, ecCount = rsBlocks[r].totalCount - dcCount;
        maxDcCount = Math.max(maxDcCount, dcCount); maxEcCount = Math.max(maxEcCount, ecCount);
        dcdata[r] = new Array(dcCount);
        for (var i = 0; i < dcdata[r].length; i += 1) dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        offset += dcCount;
        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);
        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) { var modIndex = i + modPoly.getLength() - ecdata[r].length; ecdata[r][i] = (modIndex >= 0) ? modPoly.getAt(modIndex) : 0; }
      }
      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) totalCodeCount += rsBlocks[i].totalCount;
      var data = new Array(totalCodeCount), index = 0;
      for (var i = 0; i < maxDcCount; i += 1) for (var r = 0; r < rsBlocks.length; r += 1) if (i < dcdata[r].length) { data[index] = dcdata[r][i]; index += 1; }
      for (var i = 0; i < maxEcCount; i += 1) for (var r = 0; r < rsBlocks.length; r += 1) if (i < ecdata[r].length) { data[index] = ecdata[r][i]; index += 1; }
      return data;
    };
    var createData = function(typeNumber, errorCorrectionLevel, dataList) {
      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);
      var buffer = qrBitBuffer();
      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber));
        data.write(buffer);
      }
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) totalDataCount += rsBlocks[i].dataCount;
      if (buffer.getLengthInBits() > totalDataCount * 8) throw new Error('code length overflow. (' + buffer.getLengthInBits() + '>' + totalDataCount * 8 + ')');
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) buffer.put(0, 4);
      while (buffer.getLengthInBits() % 8 != 0) buffer.putBit(false);
      while (true) {
        if (buffer.getLengthInBits() >= totalDataCount * 8) break;
        buffer.put(PAD0, 8);
        if (buffer.getLengthInBits() >= totalDataCount * 8) break;
        buffer.put(PAD1, 8);
      }
      return createBytes(buffer, rsBlocks);
    };
    _this.addData = function(data, mode) {
      mode = mode || 'Byte';
      var newData = null;
      switch (mode) {
        case 'Numeric': newData = qrNumber(data); break;
        case 'Alphanumeric': newData = qrAlphaNum(data); break;
        case 'Byte': newData = qr8BitByte(data); break;
        case 'Kanji': newData = qrKanji(data); break;
        default: throw 'mode:' + mode;
      }
      _dataList.push(newData);
      _dataCache = null;
    };
    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) throw new Error(row + ',' + col);
      return _modules[row][col];
    };
    _this.getModuleCount = function() { return _moduleCount; };
    _this.make = function() { makeImpl(false, getBestMaskPattern()); };
    return _this;
  };
  qrcode.stringToBytes = function(s) {
    var bytes = [];
    for (var i = 0; i < s.length; i += 1) bytes.push(s.charCodeAt(i) & 0xff);
    return bytes;
  };
  var QRMode = { MODE_NUMBER: 1 << 0, MODE_ALPHA_NUM: 1 << 1, MODE_8BIT_BYTE: 1 << 2, MODE_KANJI: 1 << 3 };
  var QRErrorCorrectionLevel = { L: 1, M: 0, Q: 3, H: 2 };
  var QRMaskPattern = { PATTERN000: 0, PATTERN001: 1, PATTERN010: 2, PATTERN011: 3, PATTERN100: 4, PATTERN101: 5, PATTERN110: 6, PATTERN111: 7 };
  var QRUtil = (function() {
    var PATTERN_POSITION_TABLE = [[], [6, 18], [6, 22], [6, 26], [6, 30], [6, 34], [6, 22, 38], [6, 24, 42], [6, 26, 46], [6, 28, 50], [6, 30, 54], [6, 32, 58], [6, 34, 62], [6, 26, 46, 66], [6, 26, 48, 70], [6, 26, 50, 74], [6, 30, 54, 78], [6, 30, 56, 82], [6, 30, 58, 86], [6, 34, 62, 90], [6, 28, 50, 72, 94], [6, 26, 50, 74, 98], [6, 30, 54, 78, 102], [6, 28, 54, 80, 106], [6, 32, 58, 84, 110], [6, 30, 58, 86, 114], [6, 34, 62, 90, 118], [6, 26, 50, 74, 98, 122], [6, 30, 54, 78, 102, 126], [6, 26, 52, 78, 104, 130], [6, 30, 56, 82, 108, 134], [6, 34, 60, 86, 112, 138], [6, 30, 58, 86, 114, 142], [6, 34, 62, 90, 118, 146], [6, 30, 54, 78, 102, 126, 150], [6, 24, 50, 76, 102, 128, 154], [6, 28, 54, 80, 106, 132, 158], [6, 32, 58, 84, 110, 136, 162], [6, 26, 54, 82, 110, 138, 166], [6, 30, 58, 86, 114, 142, 170]];
    var G15 = (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0);
    var G18 = (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0);
    var G15_MASK = (1 << 14) | (1 << 12) | (1 << 10) | (1 << 4) | (1 << 1);
    var _this = {};
    var getBCHDigit = function(data) { var digit = 0; while (data != 0) { digit += 1; data >>>= 1; } return digit; };
    _this.getBCHTypeInfo = function(data) {
      var d = data << 10;
      while (getBCHDigit(d) - getBCHDigit(G15) >= 0) d ^= (G15 << (getBCHDigit(d) - getBCHDigit(G15)));
      return ((data << 10) | d) ^ G15_MASK;
    };
    _this.getBCHTypeNumber = function(data) {
      var d = data << 12;
      while (getBCHDigit(d) - getBCHDigit(G18) >= 0) d ^= (G18 << (getBCHDigit(d) - getBCHDigit(G18)));
      return (data << 12) | d;
    };
    _this.getPatternPosition = function(typeNumber) { return PATTERN_POSITION_TABLE[typeNumber - 1]; };
    _this.getMaskFunction = function(maskPattern) {
      switch (maskPattern) {
        case QRMaskPattern.PATTERN000: return function(i, j) { return (i + j) % 2 == 0; };
        case QRMaskPattern.PATTERN001: return function(i, j) { return i % 2 == 0; };
        case QRMaskPattern.PATTERN010: return function(i, j) { return j % 3 == 0; };
        case QRMaskPattern.PATTERN011: return function(i, j) { return (i + j) % 3 == 0; };

  const { data, error } = await sb
    .from("acc_solicitudes_vehicular")
    .select("id, folio, fecha_inicio, fecha_termino, motivo, placa, conductor, lugar_presentacion, creado_en, acc_usuarios_area(correo_pemex, nombre)")
    .eq("estatus", "pendiente")
    .order("creado_en", { ascending: true });

  const box = document.getElementById("pendientes-list");
  if (error) { box.innerHTML = `<div class="empty-state">Error: ${error.message}</div>`; return; }
  if (!data || data.length === 0) { box.innerHTML = `<div class="empty-state">No hay solicitudes pendientes.</div>`; return; }

  box.innerHTML = `
    <table class="solicitudes">
      <thead><tr><th>Folio</th><th>Vigencia</th><th>Motivo</th><th>Placa / Conductor</th><th>Destino</th><th>Acciones</th></tr></thead>
      <tbody>
        ${data.map(s => `
          <tr>
            <td><span class="folio-chip">${s.folio}</span></td>
            <td>${formatFecha(s.fecha_inicio)} – ${formatFecha(s.fecha_termino)}</td>
            <td>${s.motivo || "—"}</td>
            <td>${s.placa || "—"} / ${s.conductor || "—"}</td>
            <td>${s.lugar_presentacion || "—"}</td>
            <td>
              <div class="row-actions">
                <button style="background:var(--dark);color:#fff;" data-autorizar="${s.id}" data-folio="${s.folio}" data-correo="${s.acc_usuarios_area?.correo_pemex || ''}" data-nombre="${s.acc_usuarios_area?.nombre || ''}">Autorizar</button>
                <button style="background:#fbeceb;color:var(--red);" data-rechazar="${s.id}">Rechazar</button>
              </div>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  box.querySelectorAll("[data-autorizar]").forEach(btn => {
    btn.addEventListener("click", async () => {
      btn.disabled = true; btn.textContent = "Autorizando…";
      try {
        const { data: qr, error } = await sb.rpc("acc_autorizar_solicitud", { p_solicitud_id: btn.dataset.autorizar });
        if (error) throw error;
        await mostrarModalQR(btn.dataset.folio, qr, btn.dataset.correo, btn.dataset.nombre);
        await renderPendientes();
        await cargarKpis();
      } catch (err) {
        alert("No se pudo autorizar: " + (err.message || err));
        btn.disabled = false; btn.textContent = "Autorizar";
      }
    });
  });

  box.querySelectorAll("[data-rechazar]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const motivo = prompt("Motivo del rechazo (se lo notificará al área usuaria):");
      if (motivo === null) return;
      btn.disabled = true;
      try {
        const { error } = await sb.rpc("acc_rechazar_solicitud", { p_solicitud_id: btn.dataset.rechazar, p_motivo: motivo });
        if (error) throw error;
        await renderPendientes();
        await cargarKpis();
      } catch (err) {
        alert("No se pudo rechazar: " + (err.message || err));
        btn.disabled = false;
      }
    });
  });
}

function dibujarQREnCanvas(canvas, texto) {
  let qr = null;
  for (let tn = 1; tn <= 15 && !qr; tn++) {
    try {
      const intento = qrcode(tn, "M");
      intento.addData(texto);
      intento.make();
      qr = intento;
    } catch (e) { /* prueba el siguiente tamaño */ }
  }
  if (!qr) throw new Error("No se pudo generar el código QR (texto demasiado largo).");

  const cell = 6, margin = 12;
  const count = qr.getModuleCount();
  const size = count * cell + margin * 2;
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = "#1e5b4f";
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) ctx.fillRect(margin + c * cell, margin + r * cell, cell, cell);
    }
  }
}

async function mostrarModalQR(folio, qrTexto, correoUsuario, nombreUsuario) {
  document.getElementById("qr-modal-folio").textContent = folio;
  const canvas = document.getElementById("qr-canvas");
  dibujarQREnCanvas(canvas, qrTexto);
  document.getElementById("qr-modal").classList.add("show");

  const btnCorreo = document.getElementById("btn-enviar-correo");
  if (correoUsuario) {
    const asunto = `SACISC · Solicitud de acceso autorizada — ${folio}`;
    const cuerpo =
`Hola ${nombreUsuario || ""},

Tu solicitud de acceso con folio ${folio} ya fue autorizada.

Para ver y descargar tu código QR, entra a SACISC, pestaña "Mis solicitudes", y presiona "Ver QR".

Presenta ese código en la caseta vehicular el día de tu visita.

Saludos,
SACISC · Control de Accesos`;
    btnCorreo.href = `mailto:${correoUsuario}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;
    btnCorreo.style.display = "block";
  } else {
    btnCorreo.style.display = "none";
  }
}
document.getElementById("btn-cerrar-qr-modal").addEventListener("click", () => {
  document.getElementById("qr-modal").classList.remove("show");
});
document.getElementById("btn-descargar-qr").addEventListener("click", () => {
  const folio = document.getElementById("qr-modal-folio").textContent;
  const canvas = document.getElementById("qr-canvas");
  const link = document.createElement("a");
  link.download = `QR-${folio}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
});

/* ---------------------------------------------------------------------
   HISTORIAL
   --------------------------------------------------------------------- */
async function renderHistorial() {
  const el = document.getElementById("tab-content");
  el.innerHTML = `
    <div class="card">
      <h2>Historial de solicitudes</h2>
      <p class="card-sub">Todas las solicitudes vehiculares, con su estatus actual.</p>
      <div class="filter-bar">
        <select id="filtro-estatus">
          <option value="">Todos los estatus</option>
          <option value="pendiente">Pendiente</option>
          <option value="autorizado">Autorizado</option>
          <option value="rechazado">Rechazado</option>
          <option value="expirado">Expirado</option>
          <option value="cerrado">Cerrado</option>
        </select>
        <input type="text" id="filtro-texto" placeholder="Buscar por folio o placa…">
      </div>
      <div id="historial-list"><div class="empty-state">Cargando…</div></div>
    </div>
  `;
  document.getElementById("filtro-estatus").addEventListener("change", cargarHistorial);
  document.getElementById("filtro-texto").addEventListener("input", debounce(cargarHistorial, 300));
  await cargarHistorial();
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

async function cargarHistorial() {
  const estatus = document.getElementById("filtro-estatus").value;
  const texto = document.getElementById("filtro-texto").value.trim();
  let query = sb.from("acc_solicitudes_vehicular")
    .select("folio, fecha_inicio, fecha_termino, motivo, placa, estatus, qr_codigo, creado_en, acc_usuarios_area(correo_pemex, nombre)")
    .order("creado_en", { ascending: false })
    .limit(100);
  if (estatus) query = query.eq("estatus", estatus);
  if (texto) query = query.or(`folio.ilike.%${texto}%,placa.ilike.%${texto}%`);

  const { data, error } = await query;
  const box = document.getElementById("historial-list");
  if (error) { box.innerHTML = `<div class="empty-state">Error: ${error.message}</div>`; return; }
  if (!data || data.length === 0) { box.innerHTML = `<div class="empty-state">Sin resultados.</div>`; return; }

  box.innerHTML = `
    <table class="solicitudes">
      <thead><tr><th>Folio</th><th>Vigencia</th><th>Motivo</th><th>Placa</th><th>Estatus</th><th>QR</th></tr></thead>
      <tbody>
        ${data.map(s => `
          <tr>
            <td><span class="folio-chip">${s.folio}</span></td>
            <td>${formatFecha(s.fecha_inicio)} – ${formatFecha(s.fecha_termino)}</td>
            <td>${s.motivo || "—"}</td>
            <td>${s.placa || "—"}</td>
            <td><span class="badge ${s.estatus}">${etiquetaEstatus(s.estatus)}</span></td>
            <td>${s.estatus === "autorizado" && s.qr_codigo
              ? `<button style="background:var(--tint);color:var(--dark);padding:6px 12px;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;" data-ver-qr="${s.qr_codigo}" data-ver-folio="${s.folio}" data-ver-correo="${s.acc_usuarios_area?.correo_pemex || ''}" data-ver-nombre="${s.acc_usuarios_area?.nombre || ''}">Ver QR</button>`
              : "—"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  box.querySelectorAll("[data-ver-qr]").forEach(btn => {
    btn.addEventListener("click", () => {
      mostrarModalQR(btn.dataset.verFolio, btn.dataset.verQr, btn.dataset.verCorreo, btn.dataset.verNombre);
    });
  });
}

function formatFecha(f) { if (!f) return "—"; const [y,m,d] = f.split("-"); return `${d}/${m}/${y}`; }
function etiquetaEstatus(e) {
  return { pendiente:"Pendiente", autorizado:"Autorizado", rechazado:"Rechazado", expirado:"Expirado", cerrado:"Cerrado" }[e] || e;
}
